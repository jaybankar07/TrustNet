<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      transition: transform 0.3s ease;
    }
    .container:hover {
      transform: translateY(-5px);
    }
    h2 {
      font-weight: 800;
      font-size: 28px;
      margin-bottom: 30px;
      background: -webkit-linear-gradient(45deg, #00f2fe, #4facfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .input-group {
      margin-bottom: 20px;
      position: relative;
    }
    input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.2);
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.3s ease;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.5);
    }
    input:focus {
      border-color: #4facfe;
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 15px rgba(79, 172, 254, 0.3);
    }
    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #4facfe, #00f2fe);
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(0, 242, 254, 0.2);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px rgba(0, 242, 254, 0.4);
    }
    button:active {
      transform: translateY(1px);
    }
    #otp-section, #success-section {
      display: none;
      animation: fadeIn 0.5s ease forwards;
    }
    #error-msg {
      color: #ff6b6b;
      margin-top: 15px;
      font-size: 14px;
      display: none;
    }
    .success-icon {
      font-size: 64px;
      margin-bottom: 20px;
      color: #00f2fe;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container" id="main-card">
    <h2>OTP Verification</h2>

    <!-- Phone Section -->
    <div id="phone-section">
      <div class="input-group">
        <input type="text" id="phone" placeholder="Enter Phone (+91...)" />
      </div>
      <button onclick="sendOtp()" id="btn-send">Send OTP</button>
    </div>

    <!-- OTP Section -->
    <div id="otp-section">
      <div class="input-group">
        <input type="text" id="otp" placeholder="Enter 6-digit OTP" />
      </div>
      <button onclick="verifyOtp()" id="btn-verify">Verify OTP</button>
    </div>

    <!-- Success Section -->
    <div id="success-section">
      <div class="success-icon">✓</div>
      <h3 style="color: #fff; margin-bottom: 10px;">Verification Complete</h3>
      <p style="color: rgba(255,255,255,0.7); font-size: 14px;">Your phone number has been successfully verified.</p>
    </div>

    <div id="error-msg"></div>
  </div>

  <script>
    let currentPhone = "";

    function showError(msg) {
      const errEl = document.getElementById("error-msg");
      errEl.innerText = msg;
      errEl.style.display = "block";
    }

    function hideError() {
      document.getElementById("error-msg").style.display = "none";
    }

    async function sendOtp() {
      hideError();
      const phoneInput = document.getElementById("phone").value.trim();
      if (!phoneInput) {
        showError("Please enter a phone number.");
        return;
      }
      currentPhone = phoneInput;

      const btn = document.getElementById("btn-send");
      btn.innerText = "Sending...";
      btn.disabled = true;

      try {
        const res = await fetch("http://localhost:3000/send-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: currentPhone })
        });
        const data = await res.json();
        
        if (data.success) {
          document.getElementById("phone-section").style.display = "none";
          document.getElementById("otp-section").style.display = "block";
        } else {
          showError(data.msg);
        }
      } catch (err) {
        showError("Network error sending OTP.");
      } finally {
        btn.innerText = "Send OTP";
        btn.disabled = false;
      }
    }

    async function verifyOtp() {
      hideError();
      const otpInput = document.getElementById("otp").value.trim();
      if (!otpInput) {
        showError("Please enter the OTP.");
        return;
      }

      const btn = document.getElementById("btn-verify");
      btn.innerText = "Verifying...";
      btn.disabled = true;

      try {
        const res = await fetch("http://localhost:3000/verify-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ phone: currentPhone, otp: otpInput })
        });
        const data = await res.json();
        
        if (data.success) {
          document.getElementById("otp-section").style.display = "none";
          document.getElementById("main-card").querySelector("h2").style.display = "none";
          document.getElementById("success-section").style.display = "block";
        } else {
          showError(data.msg);
        }
      } catch (err) {
        showError("Network error verifying OTP.");
      } finally {
        btn.innerText = "Verify OTP";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
